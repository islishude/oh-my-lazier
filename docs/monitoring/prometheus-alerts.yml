groups:
  - name: oh-my-lazier.worker
    rules:
      - alert: LazWorkerReadinessFailed
        expr: probe_success{job="laz-worker-readyz"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: LayerZero worker readiness check is failing
          runbook: docs/runbooks/monitoring.md

      - alert: LazChainPaused
        expr: laz_chain_paused == 1
        for: 0m
        labels:
          severity: page
        annotations:
          summary: LayerZero worker chain is paused by safety logic
          runbook: docs/runbooks/monitoring.md

      - alert: LazPathwayPaused
        expr: laz_pathway_paused == 1
        for: 0m
        labels:
          severity: page
        annotations:
          summary: LayerZero worker pathway is paused by safety logic
          runbook: docs/runbooks/monitoring.md

      - alert: LazDVNQuorumConflict
        expr: laz_dvn_jobs_total{status="QUORUM_CONFLICT"} > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: DVN RPC quorum conflict requires operator review
          runbook: docs/runbooks/monitoring.md

      - alert: LazDVNReorgDetected
        expr: laz_dvn_jobs_total{status="REORG_DETECTED"} > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: DVN job remains in reorg-detected state
          runbook: docs/runbooks/monitoring.md

      - alert: LazPacketManualReview
        expr: laz_packets_total{status="MANUAL_REVIEW"} > 0
        for: 0m
        labels:
          severity: ticket
        annotations:
          summary: Packet requires manual review before migration approval
          runbook: docs/runbooks/monitoring.md

      - alert: LazExecutorReceiveFailed
        expr: laz_executor_jobs_total{status="LZ_RECEIVE_FAILED"} > 0
        for: 0m
        labels:
          severity: ticket
        annotations:
          summary: Executor delivery failed and needs retry review
          runbook: docs/runbooks/monitoring.md

      - alert: LazWorkerManualReview
        expr: laz_executor_jobs_total{status="MANUAL_REVIEW"} > 0 or laz_dvn_jobs_total{status="MANUAL_REVIEW"} > 0
        for: 0m
        labels:
          severity: ticket
        annotations:
          summary: Worker job requires manual review before migration approval
          runbook: docs/runbooks/monitoring.md

      - alert: LazTxOutboxFailed
        expr: laz_tx_outbox_total{status="failed",retry_state="exhausted"} > 0
        for: 0m
        labels:
          severity: ticket
        annotations:
          summary: Transaction outbox has exhausted failed rows
          runbook: docs/runbooks/monitoring.md

      - alert: LazWorkerFeeNegativeMargin
        expr: laz_worker_fee_negative_margin_jobs > 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Worker job actual gas cost exceeds assignment revenue
          runbook: docs/runbooks/monitoring.md

      - alert: LazWorkerFeeReconciliationPending
        expr: laz_worker_fee_unpriced_receipts > 0
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: Worker receipt gas costs are waiting for source-token pricing
          runbook: docs/runbooks/monitoring.md

      - alert: LazSignerLowNativeBalance
        expr: laz_signer_native_balance_wei < laz_signer_min_native_balance_wei
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Worker signer native gas balance is below configured minimum
          runbook: docs/runbooks/monitoring.md

      - alert: LazIndexerPollFailing
        expr: laz_indexer_poll_success == 0
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Worker indexer polling is failing
          runbook: docs/runbooks/monitoring.md

      - alert: LazIndexerCursorStalled
        expr: changes(laz_indexer_cursor_last_block[10m]) == 0
        for: 10m
        labels:
          severity: page
        annotations:
          summary: Worker indexer cursor has not advanced
          runbook: docs/runbooks/monitoring.md
