name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install npm dependencies
        run: npm ci

      - name: Check format
        run: make fmt-sol-check

      - name: Compile contracts
        run: npm run compile

      - name: Typecheck scripts
        run: npm run typecheck

      - name: Run script tests
        run: npm run test:scripts

      - name: Run Solidity tests
        run: npx hardhat test solidity --no-compile

      - name: Check runbooks
        run: npm run check:runbooks

  go:
    name: Go (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: laz_worker
          POSTGRES_USER: laz_worker
          POSTGRES_PASSWORD: laz_worker
        ports: ["5432:5432"]
        options: |
          --health-cmd=pg_isready --health-start-period=1s
      ruststack:
        image: localstack/localstack:4.14.0
        env:
          SERVICES: kms
        ports: ["4566:4566"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "stable"
          check-latest: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          skip-cache: true

      - name: Check Go format
        run: make fmt-go-check

      - name: Run Go tests
        run: go test ./...
        env:
          TEST_POSTGRES_URL: "postgres://laz_worker:laz_worker@localhost:5432/laz_worker?sslmode=disable"
          RUSTACK_KMS_ENDPOINT: "http://localhost:4566"

  local-e2e:
    name: Local dual-Anvil E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: laz_worker
          POSTGRES_USER: laz_worker
          POSTGRES_PASSWORD: laz_worker
        ports: ["55433:5432"]
        options: |
          --health-cmd="pg_isready -U laz_worker -d laz_worker" --health-start-period=1s
      anvil-a:
        image: ghcr.io/foundry-rs/foundry:latest
        entrypoint: anvil
        command: >-
          --host 0.0.0.0 --port 8545 --chain-id 31337 --mnemonic
          "test test test test test test test test test test test junk"
          --accounts 10 --balance 10000
        ports: ["18545:8545"]
        options: >-
          --health-cmd="cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"
          --health-interval=2s --health-timeout=5s --health-start-period=1s
          --health-retries=30
      anvil-b:
        image: ghcr.io/foundry-rs/foundry:latest
        entrypoint: anvil
        command: >-
          --host 0.0.0.0 --port 8545 --chain-id 31338 --mnemonic
          "test test test test test test test test test test test junk"
          --accounts 10 --balance 10000
        ports: ["18546:8545"]
        options: >-
          --health-cmd="cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"
          --health-interval=2s --health-timeout=5s --health-start-period=1s
          --health-retries=30
      localstack:
        image: localstack/localstack:4.14.0
        env:
          SERVICES: kms
        ports: ["4566:4566"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "stable"
          check-latest: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          pull: true
          context: .
          file: ./Dockerfile
          tags: oh-my-lazier-worker:e2e
          load: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=local-e2e-worker-${{ runner.os }}-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=local-e2e-worker-${{ runner.os }}-${{ runner.arch }},ignore-error=true

      - name: Install npm dependencies
        run: npm ci

      - name: Run local dual-Anvil E2E
        run: make e2e-ci

  security:
    name: Security gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "stable"
          check-latest: true

      - name: Install npm dependencies
        run: npm ci

      - name: Run security gates
        run: make security-check
