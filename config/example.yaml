database_url: postgres://laz_worker:laz_worker@localhost:5432/laz_worker?sslmode=disable
metrics:
  listen_address: :9090
services:
  executor:
    enabled: true
  dvn:
    enabled: true
tx_manager:
  stale_broadcast_replacement_after_seconds: 900
signers:
  - id: "0x9999999999999999999999999999999999999999"
    type: keystore
    keystore:
      path: /run/secrets/executor-keystore.json
      password_env: KEYSTORE_PASSWORD
pricing:
  enabled: true
  signer: "0x9999999999999999999999999999999999999999"
  interval_seconds: 300
  stale_after_seconds: 1800
  max_deviation_bps: 500
  source_request_timeout_seconds: 10
  gas_spike_bps: 1000
  max_fee_per_gas_wei: "2000000000"
  max_priority_fee_per_gas_wei: "1000000000"
  min_native_balance_wei: "100000000000000000"
  chains:
    - eid: 40161
      native_asset_id: eth
      data_fee_per_byte_wei: "0"
    - eid: 40449
      native_asset_id: eth
      data_fee_per_byte_wei: "0"

    # Example cross-asset pricing chain. Same-native chains above do not need
    # market sources. Cross-asset chains still declare native_asset_id and need
    # one primary source. sanity_sources, Chainlink, and Uniswap are optional.
    # - eid: 40161
    #   native_asset_id: eth
    #   data_fee_per_byte_wei: "0"
    #   primary_source: coingecko
    #   sanity_sources:
    #     - uniswap
    #   coingecko:
    #     id: ethereum
    #     max_age_seconds: 180
    #   # Optional AggregatorV3 primary or sanity source.
    #   chainlink:
    #     feed_address: "0x1111111111111111111111111111111111111111"
    #     expected_description: "ETH / USD"
    #     max_age_seconds: 3600
    #   uniswap:
    #     # Optional V3 pool TWAP sanity source.
    #     pool_address: "0x4444444444444444444444444444444444444444"
    #     token_in: "0x2222222222222222222222222222222222222222"
    #     token_out: "0x3333333333333333333333333333333333333333"
    #     twap_window_seconds: 1800
    #     max_block_age_seconds: 120
    #     min_harmonic_mean_liquidity: "1000000"
chains:
  - eid: 40161
    name: ethereum-sepolia
    family: evm
    chain_id: 11155111
    endpoint_address: "0x1111111111111111111111111111111111111111"
    confirmations: 12
    start_block_number: 0
    indexer_query_block_range: 500
    # Supports http(s), ws(s), and absolute IPC socket paths.
    rpc_urls:
      - http://localhost:8545
    tx_roles:
      executor:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
        min_native_balance_wei: "100000000000000000"
      dvn:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
        min_native_balance_wei: "100000000000000000"
  - eid: 40449
    name: hoodi
    family: evm
    chain_id: 560048
    endpoint_address: "0x4444444444444444444444444444444444444444"
    confirmations: 12
    start_block_number: 0
    indexer_query_block_range: 500
    rpc_urls:
      - http://localhost:8546
    tx_roles:
      executor:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
        min_native_balance_wei: "100000000000000000"
      dvn:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
        min_native_balance_wei: "100000000000000000"
pathways:
  - src_eid: 40161
    dst_eid: 40449
    src_oapp: "0x7777777777777777777777777777777777777777"
    dst_oapp: "0x8888888888888888888888888888888888888888"
    send_lib: "0x9999999999999999999999999999999999999999"
    receive_lib: "0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    source_workers:
      open_executor: "0x2222222222222222222222222222222222222222"
      open_dvn: "0x3333333333333333333333333333333333333333"
      price_feed: "0x4444444444444444444444444444444444444444"
    destination_workers:
      open_dvn: "0x6666666666666666666666666666666666666666"
    dvn:
      mode: shadow
    pricing:
      executor_fee:
        fixed_fee_wei: "1000"
        dst_gas_overhead: 50000
        data_size_overhead_bytes: 0
        margin_bps: 100
      dvn_fee:
        fixed_fee_wei: "2000"
        dst_gas_overhead: 150000
        data_size_overhead_bytes: 0
        margin_bps: 200
    enabled: true
    max_message_size: 10000
    min_lz_receive_gas: 100000
    max_lz_receive_gas: 300000
  - src_eid: 40449
    dst_eid: 40161
    src_oapp: "0x8888888888888888888888888888888888888888"
    dst_oapp: "0x7777777777777777777777777777777777777777"
    send_lib: "0xbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
    receive_lib: "0xcccccccccccccccccccccccccccccccccccccccc"
    source_workers:
      open_executor: "0x5555555555555555555555555555555555555555"
      open_dvn: "0x6666666666666666666666666666666666666666"
      price_feed: "0x9999999999999999999999999999999999999999"
    destination_workers:
      open_dvn: "0x3333333333333333333333333333333333333333"
    dvn:
      mode: shadow
    pricing:
      executor_fee:
        fixed_fee_wei: "1000"
        dst_gas_overhead: 50000
        data_size_overhead_bytes: 0
        margin_bps: 100
      dvn_fee:
        fixed_fee_wei: "2000"
        dst_gas_overhead: 150000
        data_size_overhead_bytes: 0
        margin_bps: 200
    enabled: true
    max_message_size: 10000
    min_lz_receive_gas: 100000
    max_lz_receive_gas: 300000
