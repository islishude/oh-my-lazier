database_url: postgres://laz_worker:laz_worker@localhost:5432/laz_worker?sslmode=disable
metrics:
  listen_address: :9090
services:
  executor:
    enabled: true
  dvn:
    enabled: true
signers:
  - id: "0x9999999999999999999999999999999999999999"
    type: keystore
    keystore:
      path: /run/secrets/executor-keystore.json
      password_env: KEYSTORE_PASSWORD
pricing:
  enabled: false
  signer: "0x9999999999999999999999999999999999999999"
  interval_seconds: 300
  base_fee_wei: "1000"
  buffer_bps: 100
  stale_after_seconds: 1800
  max_deviation_bps: 500
  gas_spike_bps: 1000
  allow_uniswap_fallback: true
  max_fee_per_gas_wei: "2000000000"
  max_priority_fee_per_gas_wei: "1000000000"
  primary_source: binance
  # coinmarketcap_api_key_env: COINMARKETCAP_API_KEY
  chains:
    - eid: 40161
      binance_symbol: ETHUSDT
      coinmarketcap_symbol: ETH
      coingecko_id: ethereum
      uniswap:
        quoter_address: "0x1111111111111111111111111111111111111111"
        token_in: "0x2222222222222222222222222222222222222222"
        token_out: "0x3333333333333333333333333333333333333333"
        fee: 500
        amount_in_wei: "1000000000000000000"
        token_out_decimals: 6
    - eid: 40245
      binance_symbol: ETHUSDT
      coinmarketcap_symbol: ETH
      coingecko_id: ethereum
      uniswap:
        quoter_address: "0x4444444444444444444444444444444444444444"
        token_in: "0x5555555555555555555555555555555555555555"
        token_out: "0x6666666666666666666666666666666666666666"
        fee: 500
        amount_in_wei: "1000000000000000000"
        token_out_decimals: 6
chains:
  - eid: 40161
    name: ethereum-sepolia
    family: evm
    chain_id: 11155111
    endpoint_address: "0x1111111111111111111111111111111111111111"
    confirmations: 12
    start_block_number: 0
    indexer_query_block_range: 500
    # Supports http(s), ws(s), and absolute IPC socket paths.
    rpc_urls:
      - http://localhost:8545
    tx_roles:
      executor:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
      dvn:
        signer: "0x9999999999999999999999999999999999999999"
        max_fee_per_gas_wei: "2000000000"
        max_priority_fee_per_gas_wei: "1000000000"
  - eid: 40245
    name: base-sepolia
