services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: laz_worker
      POSTGRES_USER: laz_worker
      POSTGRES_PASSWORD: laz_worker
    ports:
      - "5432:5432"
    volumes:
      - ./tmp/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laz_worker -d laz_worker"]
      interval: 10s
      timeout: 5s
      start_period: 1s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: oh-my-lazier-worker:local
    command: ["-config", "/app/config/example.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://laz_worker:laz_worker@postgres:5432/laz_worker?sslmode=disable
    ports:
      - "9090:9090"
